<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>NZ Forest Interactive AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; }
      
      /* The Permission Button Styling */
      #permissionBtn {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        padding: 12px 24px;
        background: #228B22;
        color: white;
        border: none;
        border-radius: 30px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        cursor: pointer;
      }
    </style>

    <script>
      // Function to unlock the Gyroscope/Magnetometer for full 360 movement
      function unlockSensors() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(response => {
              if (response == 'granted') {
                document.getElementById('permissionBtn').style.display = 'none';
              }
            })
            .catch(console.error);
        } else {
          // For Android/Desktop where permission isn't explicitly required
          document.getElementById('permissionBtn').style.display = 'none';
        }
      }
    </script>
  </head>

  <body>

    <button id="permissionBtn" onclick="unlockSensors()">Enable 360 Tracking</button>

    <a-scene cursor="fuse: false; rayOrigin: mouse" loading-screen="dotsColor: green; backgroundColor: black">
      
      <a-assets>
        <img id="forest" src="Gemini_Generated_Image_ojdhy8ojdhy8ojdh.png" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#forest" rotation="0 -90 0" radius="50"></a-sky>

      <a-cylinder 
        position="-4 0 -7" 
        radius="0.8" 
        height="5" 
        color="#00FF00" 
        opacity="0.3" 
        onclick="alert('This is a Silver Fern (Ponga)!')">
      </a-cylinder>

      <a-box 
        position="6 0 -10" 
        width="2" 
        height="12" 
        depth="2" 
        color="#8B4513" 
        opacity="0.3" 
        onclick="alert('This is a Kauri Tree!')">
      </a-box>

      <a-entity id="rig" position="0 1.6 0">
        <a-entity camera 
                  look-controls="magicWindowTrackingEnabled: true; touchEnabled: true; pointerLockEnabled: false"
                  wasd-controls="enabled: false">
          <a-cursor color="yellow" scale="1.5 1.5 1.5"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
