<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Interactive NZ Forest</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <style>
  /* Prevents the browser from trying to scroll while you look around */
  body {
    margin: 0;
    overflow: hidden;
    touch-action: none; 
  }
      <button onclick="requestOrientationPermission()" 
        style="position: fixed; z-index: 999; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 15px; background: #008000; color: white; border: none; border-radius: 5px; font-family: sans-serif;">
  Enable 360 View
</button>
    </style>
    <script>
  // This function triggers the permission request for iOS/Android
  function requestOrientationPermission() {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(permissionState => {
          if (permissionState === 'granted') {
            window.location.reload(); // Reload to activate sensors
          }
        })
        .catch(console.error);
    } else {
      // For non-iOS devices, the sensors are usually on by default
      alert("Sensor access not restricted or not supported.");
    }
  }
</script>
  </head>
  <body>
    <a-scene cursor="fuse: false; rayOrigin: mouse">
      
      <a-assets>
        <img id="forest" src="Gemini_Generated_Image_ojdhy8ojdhy8ojdh.png" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#forest" rotation="0 -90 0"></a-sky>

      <a-cylinder 
        position="-3 -2 -5" 
        radius="0.5" 
        height="1" 
        color="green" 
        opacity="0.3" 
        onclick="alert('This is a Silver Fern (Ponga)!')">
      </a-cylinder>

      <a-box 
        position="-2 0 -5" 
        width="2" 
        height="10" 
        depth="2" 
        color="brown" 
        opacity="0.3" 
        onclick="alert('This is a Kauri Tree - a giant of the forest.')">
      </a-box>

            <a-box 
        position="2 2 2" 
        width="2" 
        height="10" 
        depth="2" 
        color="white" 
        opacity="0.5" 
        onclick="alert('Center.')">
      </a-box>
      
      <a-entity camera look-controls>
        <a-cursor color="yellow"></a-cursor>
      </a-entity>
      
    </a-scene>
  </body>
</html>
