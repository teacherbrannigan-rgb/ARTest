<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>NZ Forest Interactive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; }
      /* The Overlay: Forces a clean "Start" click */
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; text-align: center;
      }
      button {
        padding: 20px 40px; font-size: 1.2rem; background: #228B22;
        color: white; border: none; border-radius: 10px; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h1>New Zealand Forest</h1>
      <p>Tap to enter and enable 360° motion</p>
      <button onclick="startExperience()">ENTER FOREST</button>
    </div>

    <a-scene id="mainScene" style="display: none;" cursor="fuse: false; rayOrigin: mouse">
      <a-assets>
        <img id="forest" src="your-image-name.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#forest" rotation="0 -90 0"></a-sky>

      <a-cylinder position="-4 0 -7" radius="0.8" height="5" color="#00FF00" opacity="0.3" 
                  onclick="alert('This is a Silver Fern (Ponga)!')"></a-cylinder>

      <a-entity id="cameraRig" position="0 1.6 0">
        <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true">
          <a-cursor color="yellow"></a-cursor>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      function startExperience() {
        // 1. Request Sensor Permission
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(response => {
              if (response === 'granted') {
                runApp();
              } else {
                alert("Motion permission denied. Use your finger to swipe.");
                runApp();
              }
            })
            .catch(console.error);
        } else {
          // Android or Desktop
          runApp();
        }
      }

      function runApp() {
        // 2. Hide overlay and show scene
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('mainScene').style.display = 'block';
        // 3. Force A-Frame to resize for the screen
        document.querySelector('a-scene').resize();
      }
    </script>
  </body>
</html>
