<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>360 Experience Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
      
      /* Main Menu Overlay */
      #menu {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #2c3e50, #000);
        z-index: 9999; display: flex; flex-direction: column; 
        justify-content: center; align-items: center; color: white;
      }

      .btn-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

      .choice-btn {
        padding: 20px 40px; font-size: 1.1rem; cursor: pointer;
        border: 2px solid white; background: rgba(255,255,255,0.1);
        color: white; border-radius: 10px; transition: 0.3s;
      }

      .choice-btn:hover { background: white; color: black; }

      /* Back Button (hidden during menu) */
      #backBtn {
        position: fixed; top: 20px; left: 20px; z-index: 8888;
        padding: 10px 20px; background: rgba(0,0,0,0.5);
        color: white; border: 1px solid white; border-radius: 5px;
        display: none; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <button id="backBtn" onclick="returnToMenu()">← Back to Menu</button>

    <div id="menu">
      <h1>Historical & Natural Journeys</h1>
      <p>Select an experience to begin (Enables 360° Tracking)</p>
      <div class="btn-container">
        <button class="choice-btn" onclick="startScene('forest', 'Gemini_Generated_Image_ojdhy8ojdhy8ojdh.png')">NZ Forest</button>
        <button class="choice-btn" onclick="startScene('trench', 'trench-image.jpg')">WW1 Trench</button>
      </div>
    </div>

    <a-scene id="mainScene" style="display: none;" cursor="fuse: false; rayOrigin: mouse">
      <a-assets>
        <img id="skyTexture" src="" crossorigin="anonymous">
      </a-assets>

      <a-sky id="skyDisplay" src="#skyTexture" rotation="0 -90 0"></a-sky>

      <a-entity id="interactiveElements"></a-entity>

      <a-entity id="cameraRig" position="0 1.6 0">
        <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true">
          <a-cursor color="yellow"></a-cursor>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const menu = document.getElementById('menu');
      const scene = document.getElementById('mainScene');
      const backBtn = document.getElementById('backBtn');
      const sky = document.getElementById('skyTexture');
      const elements = document.getElementById('interactiveElements');

      function startScene(type, imagePath) {
        // 1. Request Sensor Permissions for Mobile
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().then(response => {
            if (response === 'granted') { loadScene(type, imagePath); }
          }).catch(console.error);
        } else {
          loadScene(type, imagePath);
        }
      }

      function loadScene(type, imagePath) {
        // Set the image
        sky.setAttribute('src', imagePath);
        
        // Clear previous hitboxes
        elements.innerHTML = '';

        // UI Toggle
        menu.style.display = 'none';
        scene.style.display = 'block';
        backBtn.style.display = 'block';
        
        // Force A-Frame to recalculate size
        document.querySelector('a-scene').resize();
      }

      function addHitbox(pos, text, color) {
        const box = document.createElement('a-cylinder');
        box.setAttribute('position', pos);
        box.setAttribute('radius', '0.5');
        box.setAttribute('height', '3');
        box.setAttribute('color', color);
        box.setAttribute('opacity', '0.3'); // Set to 0 to hide later
        box.setAttribute('onclick', `alert('${text}')`);
        elements.appendChild(box);
      }

      function returnToMenu() {
        menu.style.display = 'flex';
        scene.style.display = 'none';
        backBtn.style.display = 'none';
      }
    </script>
  </body>
</html>
